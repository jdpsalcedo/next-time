name: Deploy to Firebase App Hosting

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Cancel an in-flight run if a new push lands on main.
concurrency:
  group: app-hosting
  cancel-in-progress: true

jobs:
  rollout:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FIREBASE_PROJECT_ID: next-time-io
      # Set this to the backend ID you choose when creating the App Hosting backend.
      APP_HOSTING_BACKEND_ID: next-time
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Trigger App Hosting rollout
        run: |
          firebase apphosting:rollouts:create "$APP_HOSTING_BACKEND_ID" \
            --project "$FIREBASE_PROJECT_ID" \
            --git-branch "${{ github.ref_name }}" \
            --force
